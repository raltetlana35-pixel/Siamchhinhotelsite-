<!DOCTYPE html>
<html>
<head>
  <title>Seasons Hotel Lunglei</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: black;
    }
    }

   .hero {
  height: 100vh;
  background: 
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1566073771259-6a8506099945');
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
   }
    

    .hero-content {
  background: rgba(0, 0, 0, 0.65);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  max-width: 90%;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.9);
  border: 1px solid rgba(255,255,255,0.1);
}

    h1 {
  font-size: 42px;
  color: gold;
  margin-bottom: 15px;
  letter-spacing: 1px;
    }

p {
  font-size: 16px;
  margin-bottom: 25px;
  opacity: 0.9;
}

    button {
  padding: 12px 25px;
  font-size: 16px;
  background: gold;
  border: none;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
}

    .section {
      padding: 40px 20px;
    }

    .rooms {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;

      .hero-content {
  animation: fadeUp 1s ease;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="hero-content">
      <h1>Seasons Hotel Lunglei</h1>
      <p>Luxury stay in the heart of Lunglei</p>
      <button>Book Now</button>
    </div>
  </div>

  <div class="section">
    <h2>Our Rooms</h2>
    <div class="rooms">
      <div class="card">
        <h3>Deluxe Room</h3>
        <p>Comfortable stay with scenic view</p>
      </div>
      <div class="card">
        <h3>Premium Suite</h3>
        <p>Spacious luxury with top amenities</p>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Contact Us</h2>
    <p>📞 +91 XXXXX XXXXX</p>
    <p>📍 Lunglei, Mizoram</p>
  </div>

</body>
</html>
