<!DOCTYPE html>
<html>
<head>
  <title>Seasons Hotel Lunglei</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: black;
    }

    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1566073771259-6a8506099945') no-repeat center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      padding: 40px;
      border-radius: 10px;
    }

    h1 {
      font-size: 36px;
      color: gold;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      background: gold;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .section {
      padding: 40px 20px;
    }

    .rooms {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="overlay">
      <h1>Seasons Hotel Lunglei</h1>
      <p>Luxury stay in the heart of Lunglei</p>
      <button>Book Now</button>
    </div>
  </div>

  <div class="section">
    <h2>Our Rooms</h2>
    <div class="rooms">
      <div class="card">
        <h3>Deluxe Room</h3>
        <p>Comfortable stay with scenic view</p>
      </div>
      <div class="card">
        <h3>Premium Suite</h3>
        <p>Spacious luxury with top amenities</p>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Contact Us</h2>
    <p>📞 +91 XXXXX XXXXX</p>
    <p>📍 Lunglei, Mizoram</p>
  </div>

</body>
</html>
